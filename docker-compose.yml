version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: talk2db-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./vector_store:/app/vector_store
    networks:
      - talk2db-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: talk2db-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    networks:
      - talk2db-network
    restart: unless-stopped

networks:
  talk2db-network:
    driver: bridge